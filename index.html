<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pony Town - Murder at the Meeting</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(circle at top, #1d2433 0%, #10131b 45%, #090b10 100%);
        color: #eef2ff;
      }

      .card {
        width: min(680px, 100%);
        background: linear-gradient(160deg, rgba(26, 31, 43, 0.95), rgba(16, 19, 27, 0.95));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #cfd6e8;
        line-height: 1.6;
      }

      .launch-btn {
        width: 100%;
        margin-top: 28px;
        border: 0;
        border-radius: 14px;
        padding: 16px 20px;
        font-size: clamp(1rem, 3vw, 1.15rem);
        font-weight: 700;
        color: #0a1020;
        cursor: pointer;
        background: linear-gradient(135deg, #7fb5ff, #93d9ff);
        transition: transform 180ms ease, box-shadow 180ms ease;
        box-shadow: 0 8px 20px rgba(127, 181, 255, 0.32);
      }

      .launch-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(127, 181, 255, 0.4);
      }

      .launch-btn:active {
        transform: translateY(1px);
      }

      .status {
        margin-top: 16px;
        min-height: 24px;
        color: #9ee6b0;
        font-size: 0.95rem;
      }

      footer {
        margin-top: 24px;
        font-size: 0.85rem;
        color: #93a0bd;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Pony Town - Murder at the Meeting</h1>
      <p>
        Launch Pony Town with the custom mod package and initialize the loader script to activate
        special game mechanics and radar enhancements.
      </p>

      <button class="launch-btn" id="launchButton">¡Juega Murder at the Meeting en Pony Town!</button>
      <div class="status" id="statusMessage" aria-live="polite"></div>

      <footer>Custom client loader for PonyTown mods</footer>
    </main>

    <script>
const launchButton = document.getElementById('launchButton');
const statusMessage = document.getElementById('statusMessage');

let injectButton = null;

launchButton.addEventListener('click', () => {

  // abrir pony town
  window.open('https://pony.town', '_blank');

  statusMessage.textContent =
    'Pony Town opened. Now click "Inject Mod" while you are on the Pony Town tab.';

  // crear boton inject
  injectButton = document.createElement("button");
  injectButton.textContent = "Inject Mod Into Pony Town";
  injectButton.className = "launch-btn";
  injectButton.style.marginTop = "14px";

  injectButton.onclick = () => {

    const code = `
      const s=document.createElement("script");
      s.src="https://matm-loader.onrender.com/loader.js";
      document.head.appendChild(s);
    `;

    navigator.clipboard.writeText(
      `javascript:(function(){${code}})();`
    );

    statusMessage.textContent =
      "Bookmarklet copied! Paste it in the Pony Town tab URL bar and press Enter.";

  };

  launchButton.insertAdjacentElement("afterend", injectButton);

});
</script>
  </body>
</html>
